# cameras.yaml — darts detector camera configuration
# SPDX-License-Identifier: GPL-3.0-or-later
#
# HOW TO SET UP:
# 1. Run:  uv run python -m darts_detector.capture.list_devices
# 2. The tool will print a table of all detected cameras. Look for rows marked
#    "** DARTS CAM **" — these are your Autodarts DIY Cam devices.
# 3. Copy the "Device Path (USB instance)" value for each camera into the
#    devicePath field below, matching each physical USB port to a camera number.
#      cam_1 — first camera port
#      cam_2 — second camera port
#      cam_3 — third camera port
# 4. The devicePath is stable as long as each camera stays plugged into
#    the same physical USB port. If you move a camera to a different port,
#    re-run list_devices and update this file.
#
# NOTE: All three cameras share the same friendly name "Autodarts DIY Cam".
#       The devicePath is the only stable per-camera disambiguator on Windows.

version: 1

cameras:
  - cameraId: cam_1
    name: Camera 1
    friendlyName: "Autodarts DIY Cam"
    # Fill in after running list_devices:
    devicePath: ""
    role: cam_1
    resolution:
      width: 1280
      height: 720
    fps: 60
    exposure:
      mode: manual
      value: 100
    gain: 0
    brightness: 0
    contrast: 0
    whiteBalance:
      mode: manual
      value: 4500
    rotation: 0
    crop: null
    enabled: true

  - cameraId: cam_2
    name: Camera 2
    friendlyName: "Autodarts DIY Cam"
    # Fill in after running list_devices:
    devicePath: ""
    role: cam_2
    resolution:
      width: 1280
      height: 720
    fps: 60
    exposure:
      mode: manual
      value: 100
    gain: 0
    brightness: 0
    contrast: 0
    whiteBalance:
      mode: manual
      value: 4500
    rotation: 0
    crop: null
    enabled: true

  - cameraId: cam_3
    name: Camera 3
    friendlyName: "Autodarts DIY Cam"
    # Fill in after running list_devices:
    devicePath: ""
    role: cam_3
    resolution:
      width: 1280
      height: 720
    fps: 60
    exposure:
      mode: manual
      value: 100
    gain: 0
    brightness: 0
    contrast: 0
    whiteBalance:
      mode: manual
      value: 4500
    rotation: 0
    crop: null
    enabled: true
